# Reproducible infra (MLOps-style): release notes live in Git as first-class artifacts (not pasted CMS).
# Sequential pipeline: push -> AI gen-docs -> optional bot commit [skip ci] -> build (CDV) -> optional Vercel CLI.
# Circuit breaker: [skip ci] on the docs commit avoids infinite Action loops when github-actions[bot] pushes.
#
# Required secret: GEMINI_API_KEY
# Optional: NEXT_PUBLIC_SITE_URL (defaults to production canonical URL below), VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

name: Auto-Generate Release Notes & Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agentic-release-notes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate release notes (single-agent script)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          VERSION="$(node -p "require('./apps/landing-web/package.json').version")"
          pnpm run gen-docs -- --version "v${VERSION}"

      - name: Commit and push if release-notes changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/landing-web/content/release-notes/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes under content/release-notes — skip commit."
            exit 0
          fi
          git commit -m "docs(auto): cập nhật release notes [skip ci]"
          git push

  build-and-deploy:
    needs: agentic-release-notes
    if: always() && needs.agentic-release-notes.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest branch (include docs commit from previous job)
        run: |
          git fetch origin "${{ github.ref_name }}"
          git checkout -B "${{ github.ref_name }}" "origin/${{ github.ref_name }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing web (CDV)
        env:
          # Canonical public URL for OG/metadata; override via repo secret if needed.
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL != '' && secrets.NEXT_PUBLIC_SITE_URL || 'https://xinchao.app' }}
        run: pnpm turbo run build --filter=@xinchao/landing-web

      - name: Deploy production (Vercel CLI, optional)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL != '' && secrets.NEXT_PUBLIC_SITE_URL || 'https://xinchao.app' }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "VERCEL_TOKEN not set — skipping CLI deploy."
            echo "If the project uses Vercel Git integration, production deploys on push to main."
            exit 0
          fi
          cd apps/landing-web
          npx --yes vercel@latest deploy --prod --token "$VERCEL_TOKEN" --yes --build-env NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL"

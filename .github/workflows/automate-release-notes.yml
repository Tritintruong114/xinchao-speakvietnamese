# Reproducible infra: on each human push/merge to main, bump @xinchao/landing-web patch semver, regenerate AI release notes for that version, commit once [skip ci], then build/deploy.
# Circuit breaker: [skip ci] avoids a second Actions run on the bot push (Vercel Git may still deploy that commit).
#
# Required secret: GEMINI_API_KEY
# Optional: NEXT_PUBLIC_SITE_URL (defaults to production canonical URL below), VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

name: Auto-Generate Release Notes & Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agentic-release-notes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Version comes from root package.json "packageManager" (pnpm@9.15.9) — do not set version here.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump landing-web patch version (semver)
        run: |
          node <<'NODE'
          const fs = require('fs');
          const p = 'apps/landing-web/package.json';
          const j = JSON.parse(fs.readFileSync(p, 'utf8'));
          const parts = String(j.version || '').trim().split('.');
          if (parts.length !== 3 || parts.some((x) => !/^\d+$/.test(x))) {
            console.error('apps/landing-web/package.json version must be maj.min.patch (e.g. 1.1.0), got:', j.version);
            process.exit(1);
          }
          const [a, b, c] = parts.map(Number);
          j.version = `${a}.${b}.${c + 1}`;
          fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          console.log('Bumped to', j.version);
          NODE

      - name: Generate release notes (single-agent script)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          VERSION="$(node -p "require('./apps/landing-web/package.json').version")"
          echo "Generating release notes for v${VERSION}"
          pnpm run gen-docs -- --version "v${VERSION}"

      - name: Commit version + release notes and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/landing-web/package.json apps/landing-web/content/release-notes/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          VERSION="$(node -p "require('./apps/landing-web/package.json').version")"
          git commit -m "chore(release): v${VERSION} + release notes [skip ci]"
          git push

  build-and-deploy:
    needs: agentic-release-notes
    if: always() && needs.agentic-release-notes.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest branch (include docs commit from previous job)
        run: |
          git fetch origin "${{ github.ref_name }}"
          git checkout -B "${{ github.ref_name }}" "origin/${{ github.ref_name }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing web (CDV)
        env:
          # Canonical public URL for OG/metadata; override via repo secret if needed.
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL != '' && secrets.NEXT_PUBLIC_SITE_URL || 'https://xinchao.app' }}
        run: pnpm turbo run build --filter=@xinchao/landing-web

      - name: Deploy production (Vercel CLI, optional)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL != '' && secrets.NEXT_PUBLIC_SITE_URL || 'https://xinchao.app' }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "VERCEL_TOKEN not set — skipping CLI deploy."
            echo "If the project uses Vercel Git integration, production deploys on push to main."
            exit 0
          fi
          # Monorepo: deploy from repo root so pnpm workspace + apps/landing-web/package.json resolve.
          # Vercel project must have Root Directory = apps/landing-web (Dashboard → Settings → General).
          if [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "::error::Add GitHub secrets VERCEL_ORG_ID and VERCEL_PROJECT_ID from Vercel → Project → Settings → General."
            exit 1
          fi
          npx --yes vercel@latest deploy --prod \
            --token "$VERCEL_TOKEN" \
            --yes \
            --build-env NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL"
